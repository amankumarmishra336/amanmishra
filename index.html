<!doctype html>
<html>
  <head>
    <title>Weather App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .container {
        background: white;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 500px;
        width: 100%;
      }
      h1 {
        text-align: center;
        color: #333;
        margin-bottom: 30px;
        font-size: 28px;
      }
      .search-box {
        display: flex;
        gap: 10px;
        margin-bottom: 30px;
      }
      #cityInput {
        flex: 1;
        padding: 12px 15px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        transition: border-color 0.3s;
      }
      #cityInput:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
      }
      button {
        padding: 12px 25px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s;
      }
      button:hover {
        background: #764ba2;
        transform: translateY(-2px);
      }
      .weather-info {
        text-align: center;
        display: none;
      }
      .weather-info.show {
        display: block;
        animation: fadeIn 0.5s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .city-name {
        font-size: 32px;
        font-weight: bold;
        color: #333;
        margin-bottom: 10px;
      }
      .weather-icon {
        font-size: 60px;
        margin: 20px 0;
      }
      .temperature {
        font-size: 48px;
        color: #667eea;
        font-weight: bold;
        margin-bottom: 10px;
      }
      .weather-description {
        font-size: 18px;
        color: #666;
        text-transform: capitalize;
        margin-bottom: 20px;
      }
      .weather-details {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-top: 0;
        padding-top: 0;
        border-top: none;
      }
      .detail {
        background: #f5f5f5;
        padding: 15px;
        border-radius: 10px;
      }
      .detail-label {
        font-size: 12px;
        color: #999;
        text-transform: uppercase;
        margin-bottom: 5px;
      }
      .detail-value {
        font-size: 18px;
        font-weight: 600;
        color: #333;
      }
      .error {
        color: #e74c3c;
        text-align: center;
        padding: 15px;
        background: #ffe8e8;
        border-radius: 8px;
        display: none;
      }
      .error.show {
        display: block;
      }
      .loading {
        text-align: center;
        display: none;
      }
      .loading.show {
        display: block;
      }
      .spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #667eea;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      @media (max-width: 480px) {
        .container {
          padding: 20px;
        }
        h1 {
          font-size: 22px;
          margin-bottom: 20px;
        }
        .temperature {
          font-size: 36px;
        }
        .city-name {
          font-size: 24px;
        }
      }
      .forecast-container {
        border-top: 2px solid #eee;
        border-bottom: 2px solid #eee;
        padding: 20px 0;
        margin: 20px 0;
      }

      .forecast-container h3 {
        margin-bottom: 15px;
        color: #333;
      }

      .forecast-grid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
      }

      .forecast-card {
        width: 100px;
        background: #f5f5f5;
        padding: 10px;
        border-radius: 10px;
        text-align: center;
      }

      .forecast-day {
        font-weight: bold;
        margin-bottom: 5px;
      }

      .forecast-temp {
        color: #667eea;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🌤️ Weather App</h1>
      <div class="search-box">
        <input
          type="text"
          id="cityInput"
          placeholder="Enter city name..."
          onkeypress="handleKeyPress(event)"
        />
        <button onclick="searchWeather()">Search</button>
      </div>
      <div class="error" id="error"></div>
      <div class="loading" id="loading"><div class="spinner"></div></div>
      <div class="weather-info" id="weatherInfo">
        <div class="city-name" id="cityName"></div>
        <div class="weather-icon" id="weatherIcon"></div>
        <div class="temperature" id="temperature"></div>
        <div class="weather-description" id="description"></div>
        <div class="forecast-container" id="forecastContainer">
          <h3>5-Day Forecast</h3>
          <div class="forecast-grid" id="forecastGrid"></div>
        </div>
        <div class="weather-details">
          <div class="detail">
            <div class="detail-label">Visibility</div>
            <div class="detail-value" id="visibility"></div>
          </div>
          <div class="detail">
            <div class="detail-label">Humidity</div>
            <div class="detail-value" id="humidity"></div>
          </div>
          <div class="detail">
            <div class="detail-label">Wind Speed</div>
            <div class="detail-value" id="windSpeed"></div>
          </div>
          <div class="detail">
            <div class="detail-label">Pressure</div>
            <div class="detail-value" id="pressure"></div>
          </div>
          <div class="detail">
            <div class="detail-label">Min Temp</div>
            <div class="detail-value" id="minTemp"></div>
          </div>

          <div class="detail">
            <div class="detail-label">Max Temp</div>
            <div class="detail-value" id="maxTemp"></div>
          </div>

          <div class="detail">
            <div class="detail-label">Sunrise</div>
            <div class="detail-value" id="sunrise"></div>
          </div>

          <div class="detail">
            <div class="detail-label">Sunset</div>
            <div class="detail-value" id="sunset"></div>
          </div>
        </div>
      </div>
    </div>
    <script>
      const API_KEY = "9793e6239ec9fc570919473e7c339127";
      const API_URL = "https://api.openweathermap.org/data/2.5/weather";
      const FORECAST_URL = "https://api.openweathermap.org/data/2.5/forecast";
      //const GEO_URL = `https://api.openweathermap.org/geo/1.0/direct?q=${city}&limit=1&appid=${API_KEY}`;
      function searchWeather() {
        const city = document.getElementById("cityInput").value.trim();
        if (!city) {
          showError("Please enter a city name");
          return;
        }
        if (API_KEY === "YOUR_API_KEY_HERE") {
          showError("Please add your API key to the code first!");
          return;
        }
        fetchWeather(city);
      }
      function fetchForecast(city) {
        const url = `${FORECAST_URL}?q=${city}&appid=${API_KEY}&units=metric`;

        fetch(url)
          .then((response) => response.json())
          .then((data) => displayForecast(data));
      }
      function handleKeyPress(event) {
        if (event.key === "Enter") {
          searchWeather();
        }
      }
      function fetchWeather(city) {
        showLoading(true);
        hideError();
        const url = `${API_URL}?q=${city}&appid=${API_KEY}&units=metric`;
        fetch(url)
          .then((response) => {
            if (!response.ok) {
              throw new Error("City not found");
            }
            return response.json();
          })
          .then((data) => {
            displayWeather(data);
            fetchForecast(city);
            showLoading(false);
          })
          .catch((error) => {
            showError("Could not fetch weather. Please try again.");
            showLoading(false);
          });
      }
      function displayWeather(data) {
        const city = data.name;
        const country = new Intl.DisplayNames(["en"], {
          type: "region",
        }).of(data.sys.country);
        const temp = Math.round(data.main.temp);
        const minTemp = Math.round(data.main.temp_min) + "°C";
        const maxTemp = Math.round(data.main.temp_max) + "°C";
        const description = data.weather[0].main;
        updateBackground(data.weather[0].main);
        const humidity = data.main.humidity + "%";
        const windSpeed = data.wind.speed + " m/s";
        const pressure = data.main.pressure + " hPa";
        const visibility = (data.visibility / 1000).toFixed(1) + " km";
        const sunrise = new Date(data.sys.sunrise * 1000).toLocaleTimeString();
        const sunset = new Date(data.sys.sunset * 1000).toLocaleTimeString();
        const iconMap = {
          Clear: "☀️",
          Clouds: "☁️",
          Rain: "🌧️",
          Drizzle: "🌦️",
          Thunderstorm: "⛈️",
          Snow: "❄️",
          Mist: "🌫️",
          Smoke: "🌫️",
          Haze: "🌫️",
          Dust: "🌪️",
          Fog: "🌫️",
          Sand: "🌪️",
          Ash: "🌋",
          Squall: "💨",
          Tornado: "🌪️",
        };
        const icon = iconMap[description] || "🌤️";
        fetch(
          `https://api.openweathermap.org/geo/1.0/reverse?lat=${data.coord.lat}&lon=${data.coord.lon}&limit=1&appid=${API_KEY}`,
        )
          .then((res) => res.json())
          .then((locationData) => {
            const state = locationData[0]?.state || "";

            document.getElementById("cityName").textContent =
              `${city}, ${state}, ${country}`;
          });
        document.getElementById("temperature").textContent = temp + "°C";
        document.getElementById("description").textContent = description;
        document.getElementById("humidity").textContent = humidity;
        document.getElementById("windSpeed").textContent = windSpeed;
        document.getElementById("pressure").textContent = pressure;
        document.getElementById("visibility").textContent = visibility;
        document.getElementById("weatherIcon").textContent = icon;
        document.getElementById("minTemp").textContent = minTemp;
        document.getElementById("maxTemp").textContent = maxTemp;
        document.getElementById("sunrise").textContent = sunrise;
        document.getElementById("sunset").textContent = sunset;
        document.getElementById("weatherInfo").classList.add("show");
        document.getElementById("cityInput").value = "";
      }
      function displayForecast(data) {
        const forecastGrid = document.getElementById("forecastGrid");

        forecastGrid.innerHTML = "";

        const dailyForecasts = data.list.filter((item) =>
          item.dt_txt.includes("12:00:00"),
        );
        dailyForecasts.sort((a, b) => new Date(a.dt_txt) - new Date(b.dt_txt));
        dailyForecasts.slice(0, 7).forEach((day) => {
          const date = new Date(day.dt_txt);

          const dayName = date.toLocaleDateString("en-US", {
            weekday: "short",
          });

          forecastGrid.innerHTML += `
<div class="forecast-card">
  <div class="forecast-day">${dayName}</div>
  <div class="forecast-temp">${Math.round(day.main.temp)}°C</div>
</div>
`;
        });
      }
      function updateBackground(weather) {
        if (weather.includes("Clear")) {
          document.body.style.background =
            "linear-gradient(135deg,#f6d365,#fda085)";
        } else if (weather.includes("Rain")) {
          document.body.style.background =
            "linear-gradient(135deg,#4b79a1,#283e51)";
        } else if (weather.includes("Cloud")) {
          document.body.style.background =
            "linear-gradient(135deg,#bdc3c7,#2c3e50)";
        } else if (weather.includes("Snow")) {
          document.body.style.background =
            "linear-gradient(135deg,#e6dada,#274046)";
        } else {
          document.body.style.background =
            "linear-gradient(135deg,#667eea,#764ba2)";
        }
      }
      function showError(message) {
        const errorDiv = document.getElementById("error");
        errorDiv.textContent = message;
        errorDiv.classList.add("show");
        document.getElementById("weatherInfo").classList.remove("show");
      }
      function hideError() {
        document.getElementById("error").classList.remove("show");
      }
      function showLoading(show) {
        document.getElementById("loading").classList.toggle("show", show);
      }
    </script>
  </body>
</html>
